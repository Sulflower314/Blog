<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>思想道德与法治期末复习</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand-row">
      <a class="site-mark" href="/">FFFCX's Blog</a>
      <a class="back-link" href="/2026/07/04/思想道德与法治复习网站/">返回文章</a>
    </div>
    <button id="themeBtn" class="icon-btn" title="切换明暗" aria-label="切换明暗主题">◐</button>
  </header>

  <main>
    <section class="hero">
      <div class="hero-copy">
        <div class="eyebrow">课程/复习资料 · Review Console</div>
        <h2>把题库变成能刷、能背、能定位的复习台</h2>
        <p>默认展示原文件参考答案；联网补充与答题技巧单独分栏，避免背诵时混淆。</p>
      </div>
      <div class="brand-card" aria-label="当前资料">
        <img  
                     lazyload
                     src="/images/loading.svg"
                     data-src="./assets/study-map.png"
                      alt="思想道德与法治复习地图" 
                >
        <div>
          <h1>思想道德与法治期末复习</h1>
          <p>真题、年份出处、原文件答案、联网补充与答题技巧。</p>
        </div>
      </div>
      <div class="stats" id="stats"></div>
    </section>

    <section class="controls" aria-label="筛选">
      <div class="search-wrap">
        <span>⌕</span>
        <input id="searchInput" placeholder="搜索题目、关键词、年份，例如：2023春、法治、核心价值观" />
      </div>
      <select id="chapterFilter"></select>
      <select id="typeFilter"></select>
      <div class="toggles-wrap">
        <label class="toggle"><input id="onlyPast" type="checkbox" /> 只看标注年份题</label>
        <label class="toggle"><input id="hideAnswers" type="checkbox" /> 默认收起答案</label>
      </div>
    </section>

    <section class="layout">
      <aside class="sidebar">
        <h3>章节导航</h3>
        <div id="chapterNav"></div>
        <h3>复习来源</h3>
        <div id="sourceList" class="source-list"></div>
      </aside>
      <section id="cards" class="cards" aria-live="polite"></section>
    </section>
  </main>

  <template id="cardTpl">
    <article class="card">
      <div class="card-head">
        <div>
          <div class="meta-line"></div>
          <h3 class="question"></h3>
        </div>
        <button class="done-btn" title="标记已掌握">✓</button>
      </div>
      <div class="chips"></div>
      <div class="cue"></div>
      <div class="tabs">
        <button data-tab="original" class="active">原文件答案</button>
        <button data-tab="web">联网补充</button>
        <button data-tab="tips">答题技巧</button>
      </div>
      <div class="panel original"></div>
      <div class="panel web hidden"></div>
      <div class="panel tips hidden"></div>
    </article>
  </template>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
